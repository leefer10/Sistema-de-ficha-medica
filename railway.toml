# Railway configuration for Sistema de Hermanos Para su Salud
# Backend uses Dockerfile, Frontend uses auto-detection

[build]
# For backend service - uses Dockerfile
builder = "dockerfile"
dockerfile = "Dockerfile"

[deploy]
startCommand = "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
restartPolicyMaxRetries = 5
