# Railway configuration for Sistema de Hermanos Para su Salud
# Multi-service deployment using Docker Compose

[build]
builder = "dockerfile"
dockerfile = "docker-compose.yml"

[deploy]
# Railway handles docker-compose automatically
restartPolicyMaxRetries = 5

# Backend service (FastAPI)
[[services]]
name = "backend"
dockerfile = "Dockerfile"
port = 8000

# Frontend service (Next.js)
[[services]]
name = "frontend"
dockerfile = "Dockerfile.frontend"
port = 3000

# Database is handled as an add-on in Railway Dashboard
